<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Form. Pediatria">
<title>Formulario Pediatria</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
body { margin:0; padding:0; background:#0d1b2a; color:#e8f4f8; font-family:-apple-system,sans-serif; }

#top { position:fixed; top:0; left:0; right:0; z-index:100; background:#1a3a5c; padding:10px 12px; padding-top:max(10px, env(safe-area-inset-top)); box-shadow:0 2px 8px rgba(0,0,0,0.5); }

#top input { width:100%; padding:10px 16px; border-radius:20px; border:none; background:#0d1b2a; color:#e8f4f8; font-size:16px; outline:none; }

#nav { display:flex; align-items:center; gap:8px; margin-top:8px; }
#nav button { background:#0d1b2a; border:none; color:#4fc3f7; font-size:24px; padding:6px 14px; border-radius:8px; cursor:pointer; flex-shrink:0; }
#nav input[type=range] { flex:1; }
#nav span { color:#8baab8; font-size:12px; flex-shrink:0; min-width:50px; text-align:right; }

#content { padding-top:110px; padding-bottom:20px; }

#page-view { text-align:center; }
#page-view img { width:100%; max-width:800px; display:block; margin:0 auto; }

#results { padding:10px; display:none; }
.result { background:#1e2d3d; border:1px solid #2e4460; border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer; }
.result:active { background:#263547; }
.rpg { font-size:11px; color:#4fc3f7; font-weight:bold; margin-bottom:4px; }
.rtx { font-size:13px; line-height:1.5; }
.hl { background:rgba(79,195,247,0.25); color:#4fc3f7; }
#no-res { text-align:center; padding:40px 20px; color:#8baab8; font-size:15px; }
</style>
</head>
<body>

<div id="top">
  <input type="search" id="si" placeholder="&#128269; Pesquisar farmaco (ex: midazolam)..." autocomplete="off" autocorrect="off" autocapitalize="off">
  <div id="nav">
    <button onclick="go(cur-1)">&#8249;</button>
    <input type="range" id="sl" min="1" max="100" value="1" oninput="go(+this.value)">
    <button onclick="go(cur+1)">&#8250;</button>
    <span id="pc">1 / 100</span>
  </div>
</div>

<div id="content">
  <div id="page-view">
    <img id="pi" src="images/1.jpeg" alt="Pagina 1">
  </div>
  <div id="results"></div>
</div>

<script>
var cur = 1, sData = null, sReady = false;

function go(n) {
  n = Math.max(1, Math.min(100, n));
  cur = n;
  document.getElementById('pc').textContent = n + ' / 100';
  document.getElementById('sl').value = n;
  document.getElementById('pi').src = 'images/' + n + '.jpeg';
  document.getElementById('page-view').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('si').value = '';
  window.scrollTo(0, 0);
  try { localStorage.setItem('fp_p', n); } catch(e) {}
}

var si = document.getElementById('si');
var db;
si.addEventListener('input', function() {
  clearTimeout(db);
  var q = si.value.trim();
  if (!q) {
    document.getElementById('results').style.display = 'none';
    document.getElementById('page-view').style.display = 'block';
    return;
  }
  db = setTimeout(function(){ doSearch(q); }, 300);
});

function doSearch(query) {
  document.getElementById('page-view').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  var res = document.getElementById('results');

  if (!sReady) {
    res.innerHTML = '<div id="no-res">A carregar indice de pesquisa...</div>';
    loadSD().then(function() {
      if (si.value.trim()) doSearch(si.value.trim());
    });
    return;
  }

  var q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  var matches = [];
  for (var i = 0; i < sData.length; i++) {
    var pg = sData[i];
    var norm = pg.text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (norm.includes(q)) {
      var idx = norm.indexOf(q);
      var s = Math.max(0, idx - 60), e = Math.min(pg.text.length, idx + q.length + 160);
      var ex = pg.text.slice(s, e).replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();
      if (s > 0) ex = '...' + ex;
      if (e < pg.text.length) ex += '...';
      var re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      ex = ex.replace(re, function(m){ return '<span class="hl">' + m + '</span>'; });
      matches.push({ page: pg.page, ex: ex });
      if (matches.length >= 50) break;
    }
  }

  if (!matches.length) {
    res.innerHTML = '<div id="no-res">Sem resultados para "' + query + '"</div>';
    return;
  }

  var html = '<div style="font-size:12px;color:#8baab8;margin-bottom:8px;">' + matches.length + ' resultado(s) — toque para ver pagina</div>';
  for (var j = 0; j < matches.length; j++) {
    var m = matches[j];
    html += '<div class="result" onclick="go(' + m.page + ')">';
    html += '<div class="rpg">PAGINA ' + m.page + '</div>';
    html += '<div class="rtx">' + m.ex + '</div>';
    html += '</div>';
  }
  res.innerHTML = html;
}

function loadSD() {
  var pages = new Array(100);
  function batch(s, e) {
    return Promise.all(
      Array.from({length: e-s+1}, function(_, i){ return s+i; }).map(function(n) {
        return fetch('texts/' + n + '.txt')
          .then(function(r){ return r.ok ? r.text() : ''; })
          .then(function(t){ pages[n-1] = {page: n, text: t}; })
          .catch(function(){ pages[n-1] = {page: n, text: ''}; });
      })
    );
  }
  var ps = [];
  for (var b = 1; b <= 100; b += 25) ps.push(batch(b, Math.min(b+24, 100)));
  return Promise.all(ps).then(function(){ sData = pages; sReady = true; });
}

// Swipe
var tx=0, ty=0, tt=0;
document.addEventListener('touchstart', function(e){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; tt=Date.now(); }, {passive:true});
document.addEventListener('touchend', function(e){
  if (document.getElementById('results').style.display === 'block') return;
  var dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)*1.8 && Math.abs(dx) > 60 && Date.now()-tt < 400) go(dx < 0 ? cur+1 : cur-1);
}, {passive:true});

// Init
(function(){
  var s = 1;
  try { s = Math.max(1, Math.min(100, +localStorage.getItem('fp_p') || 1)); } catch(e) {}
  go(s);
  setTimeout(loadSD, 1500);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
})();
</script>
</body>
</html>
