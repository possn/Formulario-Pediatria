<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Form. Pediatria">
  <meta name="theme-color" content="#1a3a5c">
  <title>Formulario Pediatria</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1b2a; color: #e8f4f8; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #header { background: #1a3a5c; padding: 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #header h1 { font-size: 15px; flex: 1; }
    #pc { font-size: 13px; color: #8baab8; }
    #viewer { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; justify-content: center; }
    #viewer img { width: 100%; max-width: 900px; height: auto; display: block; padding: 8px; }
    #nav { background: #1e2d3d; border-top: 1px solid #2e4460; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    button { background: #1a3a5c; border: 1px solid #2e4460; border-radius: 10px; padding: 10px 20px; color: white; font-size: 22px; cursor: pointer; }
    button:disabled { opacity: 0.3; }
    input[type=range] { flex: 1; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Formulario de Pediatria 3a Ed.</h1>
    <div id="pc">1 / 100</div>
  </div>
  <div id="viewer">
    <img id="pi" src="images/1.jpeg" alt="Pagina 1">
  </div>
  <div id="nav">
    <button id="bp" onclick="go(cur-1)" disabled>&#8249;</button>
    <input type="range" id="sl" min="1" max="100" value="1" oninput="go(+this.value)">
    <button id="bn" onclick="go(cur+1)">&#8250;</button>
  </div>
  <script>
    var cur = 1;
    function go(n) {
      n = Math.max(1, Math.min(100, n));
      cur = n;
      document.getElementById('pi').src = 'images/' + n + '.jpeg';
      document.getElementById('pc').textContent = n + ' / 100';
      document.getElementById('sl').value = n;
      document.getElementById('bp').disabled = n === 1;
      document.getElementById('bn').disabled = n === 100;
      document.getElementById('viewer').scrollTo(0, 0);
    }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
  </script>
</body>
</html>
