<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Form. Pediatria">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a3a5c">
  <title>Formulário de Pediatria 3a Ed.</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#1a3a5c;--nl:#2a5298;--ac:#4fc3f7;
      --bg:#0d1b2a;--s1:#1e2d3d;--s2:#263547;
      --tx:#e8f4f8;--mu:#8baab8;--bd:#2e4460;
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
    }
    html,body{height:100%;background:var(--bg);color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      overflow:hidden;-webkit-tap-highlight-color:transparent}
    #app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}
    #hd{background:var(--navy);padding:calc(var(--st) + 10px) 12px 10px;
      display:flex;align-items:center;gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0;z-index:100}
    .logo{width:36px;height:36px;background:var(--ac);border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:14px;color:var(--navy);flex-shrink:0}
    .tb{flex:1;min-width:0}
    .tb h1{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tb .sub{font-size:11px;color:var(--ac);margin-top:1px}
    #pc{font-size:13px;color:var(--mu);flex-shrink:0;font-variant-numeric:tabular-nums}
    #bar{background:var(--s1);border-bottom:1px solid var(--bd);
      display:flex;align-items:center;gap:8px;padding:8px 12px;flex-shrink:0}
    .sw{position:relative;flex:1}
    #si{width:100%;background:var(--s2);border:1px solid var(--bd);
      border-radius:20px;padding:7px 14px 7px 36px;color:var(--tx);font-size:14px;
      outline:none;-webkit-appearance:none;transition:border-color .2s}
    #si:focus{border-color:var(--ac)}
    #si::placeholder{color:var(--mu)}
    .sic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none}
    .bi{background:var(--s2);border:1px solid var(--bd);border-radius:8px;
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;
      color:var(--tx);cursor:pointer;font-size:16px;flex-shrink:0;
      transition:background .15s;-webkit-user-select:none}
    .bi:active{background:var(--nl)}
    .bi.on{border-color:var(--ac);color:var(--ac)}
    #main{flex:1;overflow:hidden;position:relative}
    #vw{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;
      display:flex;flex-direction:column;align-items:center}
    #iw{position:relative;width:100%;max-width:900px;padding:8px}
    #pi{width:100%;height:auto;display:block;border-radius:8px;
      box-shadow:0 4px 20px rgba(0,0,0,.5);background:var(--s1);min-height:200px;transition:opacity .2s}
    #pi.ld{opacity:.35;animation:pu 1s infinite alternate}
    @keyframes pu{from{opacity:.25}to{opacity:.55}}
    #zc{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;gap:6px;z-index:10}
    .zb{width:38px;height:38px;background:rgba(26,58,92,.9);border:1px solid var(--bd);
      border-radius:8px;color:var(--tx);font-size:22px;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .zb:active{background:var(--nl)}
    #nb{background:var(--s1);border-top:1px solid var(--bd);
      padding:8px 16px calc(var(--sb) + 8px);
      display:flex;align-items:center;gap:12px;flex-shrink:0}
    .nb{background:var(--navy);border:1px solid var(--bd);border-radius:10px;
      padding:10px 20px;color:var(--tx);font-size:22px;cursor:pointer;flex-shrink:0;
      -webkit-user-select:none;transition:background .15s}
    .nb:active{background:var(--nl)}
    .nb:disabled{opacity:.3;pointer-events:none}
    #sl{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;
      background:var(--bd);outline:none;cursor:pointer}
    #sl::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
      border-radius:50%;background:var(--ac);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4)}
    .pn{position:absolute;inset:0;background:var(--bg);z-index:50;
      overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:10px}
    .pn.op{display:block}
    #tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
    .ti{cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;
      background:var(--s1);transition:border-color .15s,transform .1s;position:relative}
    .ti:active{transform:scale(.97)}
    .ti.cur{border-color:var(--ac)}
    .ti img{width:100%;height:auto;display:block}
    .tn{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.65);
      color:white;font-size:10px;padding:2px 5px;border-radius:4px;font-weight:600}
    #ss{font-size:12px;color:var(--mu);margin-bottom:10px;padding:0 2px}
    .sr{background:var(--s1);border:1px solid var(--bd);border-radius:10px;
      padding:12px;margin-bottom:10px;cursor:pointer;transition:background .15s,border-color .15s}
    .sr:active{background:var(--s2);border-color:var(--ac)}
    .sp{font-size:11px;color:var(--ac);font-weight:700;margin-bottom:4px;
      text-transform:uppercase;letter-spacing:.5px}
    .st{font-size:13px;line-height:1.5;display:-webkit-box;
      -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .hl{background:rgba(79,195,247,.25);color:var(--ac);border-radius:2px;padding:0 1px}
    #ne{text-align:center;color:var(--mu);padding:40px 20px;font-size:15px}
    #ne span{font-size:40px;display:block;margin-bottom:10px}
    #ib{position:fixed;bottom:0;left:0;right:0;background:var(--nl);color:white;
      padding:12px 16px calc(var(--sb) + 12px);display:none;align-items:center;
      gap:10px;z-index:200;box-shadow:0 -4px 12px rgba(0,0,0,.4)}
    #ib.show{display:flex}
    #ib p{flex:1;font-size:13px}
    #bii{background:var(--ac);border:none;border-radius:8px;
      padding:8px 14px;font-size:13px;font-weight:700;color:var(--navy);cursor:pointer}
    #bic{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px}
    #sp{position:fixed;inset:0;background:var(--navy);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:999;transition:opacity .4s}
    #sp.hide{opacity:0;pointer-events:none}
    #sp h2{font-size:20px;font-weight:700;color:white;text-align:center;padding:0 20px;margin-top:16px}
    #sp p{font-size:14px;color:var(--ac);margin-top:8px}
    .lb{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:28px;overflow:hidden}
    .lf{height:100%;background:var(--ac);border-radius:2px;animation:la 1.9s ease forwards}
    @keyframes la{0%{width:0}100%{width:100%}}
  </style>
</head>
<body>
<div id="sp">
  <svg width="80" height="80" viewBox="0 0 80 80">
    <rect x="30" y="5" width="20" height="70" rx="4" fill="white"/>
    <rect x="5" y="30" width="70" height="20" rx="4" fill="white"/>
  </svg>
  <h2>Formulario de Pediatria</h2>
  <p>3a Edicao</p>
  <div class="lb"><div class="lf"></div></div>
</div>

<div id="app">
  <div id="hd">
    <div class="logo">FP</div>
    <div class="tb"><h1>Formulario de Pediatria</h1><div class="sub">3a Edicao</div></div>
    <div id="pc">1 / 100</div>
  </div>
  <div id="bar">
    <div class="sw">
      <span class="sic">&#128269;</span>
      <input type="search" id="si" placeholder="Pesquisar medicamento..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="bi" id="bt">&#x229e;</div>
  </div>
  <div id="main">
    <div id="vw">
      <div id="iw">
        <img id="pi" class="ld" alt="Pagina 1" draggable="false">
        <div id="zc">
          <div class="zb" id="zi">+</div>
          <div class="zb" id="zo">&#8722;</div>
        </div>
      </div>
    </div>
    <div id="tp" class="pn"><div id="tg"></div></div>
    <div id="srp" class="pn"><div id="ss"></div><div id="sr"></div></div>
  </div>
  <div id="nb">
    <button class="nb" id="bp" disabled>&#8249;</button>
    <input type="range" id="sl" min="1" max="100" value="1">
    <button class="nb" id="bn">&#8250;</button>
  </div>
</div>

<div id="ib">
  <p>&#128241; Instalar no ecra principal para acesso offline</p>
  <button id="bii">Instalar</button>
  <button id="bic">&#10005;</button>
</div>

<script>
var N=100,cur=1,zoom=1,tBuilt=false,dp=null,sData=null,sReady=false;
function$(i){return document.getElementById(i)}
var PI=$('pi'),PC=$('pc'),SL=$('sl'),BP=$('bp'),BN=$('bn');
var BT=$('bt'),TP=$('tp'),TG=$('tg'),SI=$('si'),SRP=$('srp');
var SR=$('sr'),SS=$('ss'),IW=$('iw'),VW=$('vw');

function goTo(n){
  n=Math.max(1,Math.min(N,n));cur=n;
  PC.textContent=n+' / '+N;SL.value=n;
  BP.disabled=n===1;BN.disabled=n===N;
  PI.classList.add('ld');
  var t=new Image();
  t.onload=t.onerror=function(){PI.src='images/'+n+'.jpeg';PI.classList.remove('ld')};
  t.src='images/'+n+'.jpeg';
  VW.scrollTo(0,0);
  document.querySelectorAll('.ti').forEach(function(el,i){el.classList.toggle('cur',i+1===n)});
  try{localStorage.setItem('fp_p',n)}catch(e){}
  [n+1,n+2,n-1].forEach(function(p){
    if(p>=1&&p<=N){var l=document.createElement('link');l.rel='prefetch';l.href='images/'+p+'.jpeg';document.head.appendChild(l)}
  });
}

BP.onclick=function(){goTo(cur-1)};
BN.onclick=function(){goTo(cur+1)};
SL.oninput=function(){goTo(+SL.value)};

$('zi').onclick=function(){zoom=Math.min(zoom+0.25,4);applyZ()};
$('zo').onclick=function(){zoom=Math.max(zoom-0.25,1);applyZ()};
function applyZ(){IW.style.width=zoom===1?'100%':(zoom*100)+'%';IW.style.maxWidth=zoom===1?'900px':'none'}

var tx=0,ty=0,tt=0;
VW.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now()},{passive:true});
VW.addEventListener('touchend',function(e){
  if(zoom>1)return;
  var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)*1.8&&Math.abs(dx)>55&&Date.now()-tt<400)goTo(dx<0?cur+1:cur-1);
},{passive:true});

document.addEventListener('keydown',function(e){
  if(document.activeElement===SI)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(cur-1);
});

BT.onclick=function(){
  var op=TP.classList.toggle('op');
  BT.classList.toggle('on',op);
  if(op){SRP.classList.remove('op');SI.value='';buildT();
    setTimeout(function(){var el=TG.children[cur-1];if(el)el.scrollIntoView({block:'center',behavior:'smooth'})},80)}
};

function buildT(){
  if(tBuilt)return;tBuilt=true;
  var f=document.createDocumentFragment();
  for(var i=1;i<=N;i++){
    var d=document.createElement('div');d.className='ti'+(i===cur?' cur':'');
    var im=document.createElement('img');im.loading='lazy';im.src='images/'+i+'.jpeg';im.alt=i;
    var nm=document.createElement('div');nm.className='tn';nm.textContent=i;
    d.appendChild(im);d.appendChild(nm);
    (function(pg){d.onclick=function(){TP.classList.remove('op');BT.classList.remove('on');goTo(pg)}})(i);
    f.appendChild(d);
  }
  TG.appendChild(f);
}

SI.addEventListener('focus',function(){TP.classList.remove('op');BT.classList.remove('on')});
var db;
SI.addEventListener('input',function(){
  clearTimeout(db);
  var q=SI.value.trim();
  if(!q){SRP.classList.remove('op');return}
  db=setTimeout(function(){doSearch(q)},350);
});

function doSearch(query){
  SRP.classList.add('op');TP.classList.remove('op');BT.classList.remove('on');
  if(!sReady){SS.textContent='Aguarde, a carregar indice...';SR.innerHTML='';
    loadSD().then(function(){if(SI.value.trim()===query)doSearch(query)});return}
  var q=query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  var matches=[];
  for(var i=0;i<sData.length;i++){
    var pg=sData[i];
    var norm=pg.text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(norm.includes(q)){
      var idx=norm.indexOf(q);
      var s=Math.max(0,idx-80),e=Math.min(pg.text.length,idx+q.length+120);
      var ex=pg.text.slice(s,e).replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').trim();
      if(s>0)ex='...'+ex;if(e<pg.text.length)ex+='...';
      var re=new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
      ex=ex.replace(re,function(m){return'<span class="hl">'+m+'</span>'});
      matches.push({page:pg.page,ex:ex});
      if(matches.length>=60)break;
    }
  }
  SS.textContent=matches.length?matches.length+' resultado(s) para "'+query+'"':'';
  if(!matches.length){SR.innerHTML='<div id="ne"><span>&#128270;</span>Sem resultados para <strong>"'+query+'"</strong></div>';return}
  var f=document.createDocumentFragment();
  for(var j=0;j<matches.length;j++){
    var m=matches[j];var div=document.createElement('div');div.className='sr';
    div.innerHTML='<div class="sp">Pagina '+m.page+'</div><div class="st">'+m.ex+'</div>';
    (function(pg){div.onclick=function(){SRP.classList.remove('op');SI.value='';goTo(pg)}})(m.page);
    f.appendChild(div);
  }
  SR.innerHTML='';SR.appendChild(f);
}

function loadSD(){
  if(sReady)return Promise.resolve();
  var pages=new Array(N);
  function batch(s,e){
    return Promise.all(
      Array.from({length:e-s+1},function(_,i){return s+i}).map(function(n){
        return fetch('texts/'+n+'.txt').then(function(r){return r.ok?r.text():''}).then(function(t){pages[n-1]={page:n,text:t}}).catch(function(){pages[n-1]={page:n,text:''}})
      })
    );
  }
  var ps=[];
  for(var b=1;b<=N;b+=25)ps.push(batch(b,Math.min(b+24,N)));
  return Promise.all(ps).then(function(){sData=pages;sReady=true});
}

window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();dp=e;$('ib').classList.add('show');
});
$('bii').onclick=function(){
  if(dp){dp.prompt();dp.userChoice.then(function(){dp=null;$('ib').classList.remove('show')})}
};
$('bic').onclick=function(){$('ib').classList.remove('show')};

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});

window.addEventListener('load',function(){
  var s=1;try{s=Math.max(1,Math.min(N,+localStorage.getItem('fp_p')||1))}catch(e){}
  setTimeout(function(){
    var sp=$('sp');sp.classList.add('hide');setTimeout(function(){sp.remove()},450);
  },500);
  goTo(s);
  setTimeout(loadSD,4000);
});
</script>
</body>
</html>
